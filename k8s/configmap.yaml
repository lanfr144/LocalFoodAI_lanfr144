apiVersion: v1
kind: ConfigMap
metadata:
  name: food-ai-config
  namespace: food-ai
data:
  my.cnf: |
    [mysqld]
    sql_mode=STRICT_TRANS_TABLES,ERROR_FOR_DIVISION_BY_ZERO,NO_AUTO_CREATE_USER,NO_ENGINE_SUBSTITUTION
    innodb_file_per_table=1
    max_allowed_packet=256M
    innodb_log_file_size=256M
  APP_ENV: "production"
  LOG_PATH: "/logs"
